<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>LeveL — Print</title>
<style>
  @page { size: 1320px 1100px; margin: 0; }
  html, body { margin: 0; padding: 0; background: #f5f1e8; font-family: 'Inter', system-ui, sans-serif; -webkit-print-color-adjust: exact; print-color-adjust: exact; color-adjust: exact; }
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  .page {
    width: 1320px;
    background: #f5f1e8;
    padding: 36px 40px 40px;
    box-sizing: border-box;
    page-break-after: always;
    break-after: page;
    page-break-inside: avoid;
    break-inside: avoid;
    position: relative;
  }
  .page:last-child { page-break-after: auto; break-after: auto; }
  .page-head {
    display: flex; align-items: baseline; justify-content: space-between;
    border-bottom: 1px solid #dcd2bf; padding-bottom: 14px; margin-bottom: 22px;
  }
  .page-head .label {
    font-family: 'Geist Mono', ui-monospace, monospace; font-size: 11px;
    letter-spacing: .18em; text-transform: uppercase; color: #6b6259;
  }
  .page-head .num {
    font-family: 'Instrument Serif', Georgia, serif; font-style: italic; font-size: 20px; color: #161311;
  }
  .artboard {
    width: 1240px; margin: 0 auto;
    border: 1px solid #dcd2bf; border-radius: 10px; overflow: hidden;
    box-shadow: 0 2px 8px rgba(35,25,15,.06);
    background: #f5f1e8;
  }
  .artboard-inner { width: 1240px; }
  /* hide design canvas chrome on print just in case */
  .dc-toolbar, .dc-zoom, .dc-overlay { display: none !important; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="brand/level-mark.jsx"></script>
<script type="text/babel" src="hf/hf-primitives.jsx"></script>
<script type="text/babel" src="hf/hf-screens-a.jsx"></script>
<script type="text/babel" src="hf/hf-screens-b.jsx"></script>
<script type="text/babel" src="hf/hf-screens-c.jsx"></script>
<script type="text/babel">
  const pages = [
    { label: '00 · Onboarding · The Contract',          h: 1100, C: HfOnboarding },
    { label: '01 · Today · 3 Cores + Optionals',        h: 920,  C: HfToday },
    { label: '02 · Skip-Reason Modal — the soul',       h: 900,  C: HfReasoning },
    { label: '03 · Reward Calendar · 6 fixed rewards',  h: 1020, C: HfRewardCalendar },
    { label: '04 · Levels · 30-row alternating ladder', h: 1280, C: HfLevels },
    { label: '05 · Day Detail · review past day',       h: 1080, C: HfDayDetail },
    { label: '06 · Day 91 · Continuation',              h: 1100, C: HfContinuation },
    { label: '07 · Settings · locks vs editable',       h: 1100, C: HfSettings },
  ];

  function Page({ label, num, total, h, C }) {
    return (
      <div className="page" style={{ minHeight: h + 100 }}>
        <div className="page-head">
          <div>
            <div className="label">LEVEL — Hi-Fi · v2</div>
            <div className="num" style={{ marginTop: 4 }}>{label}</div>
          </div>
          <div className="label">{String(num).padStart(2,'0')} / {String(total).padStart(2,'0')}</div>
        </div>
        <div className="artboard" style={{ height: h }}>
          <div className="artboard-inner" style={{ height: h }}>
            <C />
          </div>
        </div>
      </div>
    );
  }

  function App() {
    return (
      <>
        {pages.map((p, i) => (
          <Page key={i} {...p} num={i + 1} total={pages.length} />
        ))}
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  // Auto-print after fonts + layout settle
  (async () => {
    try { await document.fonts.ready; } catch (e) {}
    setTimeout(() => { window.print(); }, 800);
  })();
</script>
</body>
</html>
